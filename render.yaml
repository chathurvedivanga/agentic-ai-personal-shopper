services:
  - type: web
    name: agentic-ai-personal-shopper-api
    runtime: python
    plan: free
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --worker-class gthread --threads 8 --timeout 120 --bind 0.0.0.0:$PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.4
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_FALLBACK_MODELS
        value: gemini-2.0-flash,gemini-flash-latest
      - key: CORS_ORIGIN
        fromService:
          type: web
          name: ai-shopping-partner-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: DATABASE_URL
        fromDatabase:
          name: agentic-ai-personal-shopper-db
          property: connectionString
      - key: DB_PATH
        value: agentic_shopper.db

  - type: web
    name: ai-shopping-partner-web
    runtime: static
    rootDir: client
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: agentic-ai-personal-shopper-api
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: agentic-ai-personal-shopper-db
    plan: free
